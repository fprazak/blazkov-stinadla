<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stínadla — Tisk kartiček a tras</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #111; background: #fff;
      margin: 0; padding: 24px;
    }
    h1 { font-size: 1.3rem; margin: 0 0 4px; }
    h2 { font-size: 1.05rem; margin: 22px 0 8px; border-bottom: 2px solid #111; padding-bottom: 4px; }
    .muted { color: #666; font-size: 0.85rem; }

    .toolbar { margin: 12px 0 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .toolbar button {
      padding: 10px 18px; font-size: 1rem; cursor: pointer;
      border: 2px solid #111; background: #111; color: #fff; border-radius: 8px;
    }
    .toolbar button.ghost { background: #fff; color: #111; }

    /* --- kartičky na vystřižení --------------------------------------- */
    .cards-page {
      display: grid;
      grid-template-columns: repeat(3, 52mm);
      grid-template-rows: repeat(3, 52mm);
      gap: 4mm;
      width: 164mm;
      margin-bottom: 8mm;
    }
    .karta {
      width: 52mm; height: 52mm;
      border: 1.5px dashed #999;
      border-radius: 3mm;
      display: flex; flex-direction: column;
      overflow: hidden;
      break-inside: avoid;
      background: #fff;
    }
    .k-head {
      background: var(--c, #333); color: #fff;
      font-weight: 800; font-size: 4.4mm;
      padding: 2.2mm 3mm; letter-spacing: 0.03em;
      display: flex; justify-content: space-between; align-items: center;
    }
    .k-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1mm; }
    .k-az { font-size: 10.5mm; font-weight: 800; line-height: 1; }
    .k-az small { font-size: 5.5mm; font-weight: 700; }
    .k-dist { font-size: 4.6mm; font-weight: 600; }
    .k-cil { font-size: 7mm; font-weight: 800; text-align: center; line-height: 1.2; }
    .k-coord {
      font-family: "Courier New", monospace; font-size: 3mm;
      text-align: center; color: #555; padding: 1.5mm; border-top: 1px solid #ddd;
    }

    /* --- tabulky tras --------------------------------------------------- */
    .route { break-inside: avoid; margin-bottom: 14px; }
    .route h3 { margin: 0 0 4px; font-size: 1rem; }
    .route h3 .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 6px; }
    .route code { background: #eee; padding: 1px 7px; border-radius: 4px; font-size: 0.9rem; }
    table { border-collapse: collapse; width: 100%; max-width: 640px; font-size: 0.85rem; }
    th, td { border: 1px solid #bbb; padding: 4px 8px; text-align: left; }
    th { background: #f0f0f0; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td.mono { font-family: "Courier New", monospace; }

    @media print {
      body { padding: 0; }
      .no-print { display: none !important; }
      /* přesně 3×3 kartičky na A4, zlom mezi stránkami */
      .cards-page { page-break-after: always; break-after: page; margin-bottom: 0; }
      .cards-page:last-of-type { page-break-after: auto; break-after: auto; }
      .karta { break-inside: avoid; page-break-inside: avoid; }
      h2 { page-break-before: auto; }
      #sekce-trasy { page-break-before: always; }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <h1>🦔 Stínadla — tisk kartiček a tras</h1>
    <p class="muted">Kartičky 52×52 mm na vystřižení (jedna na každé stanoviště každého týmu) +
      přehled tras. Data se načítají živě z databáze.</p>
    <div class="toolbar">
      <button onclick="window.print()">🖨 Vytisknout</button>
      <button class="ghost" onclick="location.href='admin.html'">← zpět do přehledu</button>
    </div>
  </div>

  <div id="obsah"><p class="muted">Načítám data…</p></div>

  <script type="module">
    import { db, collection, getDocs, doc, getDoc } from "./db.js";

    const PALETTE = ["#e6194b","#3cb44b","#4363d8","#f58231","#911eb4",
                     "#42d4f4","#f032e6","#bfef45","#fabed4","#469990"];
    // barva týmu podle NÁZVU (slovo barvy v názvu = skutečná barva);
    // fallback = paleta podle pořadí
    const COLOR_WORDS = [
      [/černe|černa|černá|cerna/i, "#333333"],
      [/červen|cerven/i, "#d92b2b"],
      [/fialov/i, "#8e24aa"],
      [/modr/i, "#1e63d0"],
      [/zelen/i, "#2e9e44"],
      [/žlut|zlut/i, "#c9a300"],
      [/oranž|oranz/i, "#f07800"],
      [/růžov|ruzov/i, "#e91e8c"],
      [/hněd|hned/i, "#8d6e63"],
      [/tyrkys|azur/i, "#00acc1"],
    ];
    function teamColor(name, i) {
      for (const [re, c] of COLOR_WORDS) if (re.test(name || "")) return c;
      return PALETTE[i % PALETTE.length];
    }
    const DIRS = ["S","SSV","SV","VSV","V","VJV","JV","JJV","J","JJZ","JZ","ZJZ","Z","ZSZ","SZ","SSZ"];
    const compass = d => DIRS[Math.round(d / 22.5) % 16];
    const DECLINATION_DEG = 5;
    const toMagnetic = d => ((d - DECLINATION_DEG) % 360 + 360) % 360;
    function bearingDeg(aLat, aLng, bLat, bLng) {
      const r = x => x * Math.PI / 180, g = x => x * 180 / Math.PI;
      const y = Math.sin(r(bLng - aLng)) * Math.cos(r(bLat));
      const x = Math.cos(r(aLat)) * Math.sin(r(bLat)) - Math.sin(r(aLat)) * Math.cos(r(bLat)) * Math.cos(r(bLng - aLng));
      return (g(Math.atan2(y, x)) + 360) % 360;
    }
    function distM(aLat, aLng, bLat, bLng) {
      const R = 6371000, r = x => x * Math.PI / 180;
      const h = Math.sin(r(bLat - aLat) / 2) ** 2 +
                Math.cos(r(aLat)) * Math.cos(r(bLat)) * Math.sin(r(bLng - aLng) / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    // krátké jméno na kartičku: "Tým 1 — Červená" → "ČERVENÁ"
    const shortName = (name) => {
      const m = name.match(/—\s*(.+)$/);
      return (m ? m[1] : name).toUpperCase();
    };

    async function run() {
      const gameSnap = await getDoc(doc(db, "games", "stinadla"));
      const start = gameSnap.exists() && gameSnap.data().start &&
        typeof gameSnap.data().start.lat === "number" ? gameSnap.data().start : null;
      const snap = await getDocs(collection(db, "games", "stinadla", "teams"));
      const teams = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(t => Array.isArray(t.points) && t.points.length)
        .sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id, "cs"));

      const cardList = []; let routes = "";
      teams.forEach((t, i) => {
        const color = teamColor(t.name || t.id, i);
        const pts = t.points;

        // ⛺ startovní kartička týmu (tábor → S1)
        if (start && pts.length) {
          const b = Math.round(toMagnetic(bearingDeg(start.lat, start.lng, pts[0].lat, pts[0].lng)));
          const d = Math.round(distM(start.lat, start.lng, pts[0].lat, pts[0].lng));
          cardList.push(`
            <div class="karta" style="--c:${color}">
              <div class="k-head"><span>${esc(shortName(t.name || t.id))}</span><span>⛺ START</span></div>
              <div class="k-body">
                <div class="k-dist">První bod: <strong>${d} m</strong></div>
                <div class="k-az">${b}° <small>${compass(b)}</small></div>
              </div>
              <div class="k-coord">${start.lat.toFixed(6)}, ${start.lng.toFixed(6)}</div>
            </div>`);
        }

        pts.forEach((pt, j) => {
          const isFinal = j === pts.length - 1;
          const next = pts[j + 1];
          let body;
          if (isFinal || !next) {
            body = `<div class="k-cil" style="font-size:5.6mm">Vrať se do tábora<br>
              <span style="font-size:4.2mm;font-weight:600">Kdo to sedí na lavičce?</span></div>`;
          } else {
            const b = Math.round(toMagnetic(bearingDeg(pt.lat, pt.lng, next.lat, next.lng)));
            const d = Math.round(distM(pt.lat, pt.lng, next.lat, next.lng));
            body = `
              <div class="k-dist">Další bod: <strong>${d} m</strong></div>
              <div class="k-az">${b}° <small>${compass(b)}</small></div>`;
          }
          cardList.push(`
            <div class="karta" style="--c:${color}">
              <div class="k-head"><span>${esc(shortName(t.name || t.id))}</span><span>S${j + 1}${isFinal ? " 🏁" : ""}</span></div>
              <div class="k-body">${body}</div>
              <div class="k-coord">${pt.lat.toFixed(6)}, ${pt.lng.toFixed(6)}</div>
            </div>`);
        });

        // tabulka trasy (s řádkem startu z tábora)
        let startRow = "";
        if (start) {
          const b = Math.round(toMagnetic(bearingDeg(start.lat, start.lng, pts[0].lat, pts[0].lng)));
          const d = Math.round(distM(start.lat, start.lng, pts[0].lat, pts[0].lng));
          startRow = `<tr><td><strong>⛺</strong></td>
            <td class="mono">${start.lat.toFixed(6)}, ${start.lng.toFixed(6)} (tábor)</td>
            <td>${d} m</td><td><strong>${b}° ${compass(b)}</strong></td></tr>`;
        }
        const rows = startRow + pts.map((pt, j) => {
          const isFinal = j === pts.length - 1;
          const next = pts[j + 1];
          let nd = "—", na = "—";
          if (next) {
            const b = Math.round(toMagnetic(bearingDeg(pt.lat, pt.lng, next.lat, next.lng)));
            nd = Math.round(distM(pt.lat, pt.lng, next.lat, next.lng)) + " m";
            na = `${b}° ${compass(b)}`;
          }
          return `<tr><td><strong>S${j + 1}</strong>${isFinal ? " 🏁" : ""}</td>
            <td class="mono">${pt.lat.toFixed(6)}, ${pt.lng.toFixed(6)}</td>
            <td>${nd}</td><td><strong>${na}</strong></td></tr>`;
        }).join("");
        routes += `
          <div class="route">
            <h3><span class="dot" style="background:${color}"></span>${esc(t.name || t.id)}
              <code>${esc(t.password || "")}</code></h3>
            <table>
              <thead><tr><th>Bod</th><th>Souřadnice</th><th>→ další bod</th><th>Azimut (buzola)</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      });

      // stránky po 9 kartách (3×3 na A4)
      const pages = [];
      for (let i = 0; i < cardList.length; i += 9) {
        pages.push(`<div class="cards-page">${cardList.slice(i, i + 9).join("")}</div>`);
      }
      document.getElementById("obsah").innerHTML = `
        <h2 class="no-print">✂️ Kartičky stanovišť (${cardList.length} ks vč. startovních) — ${pages.length} stran po 3×3</h2>
        ${pages.join("")}
        <h2 id="sekce-trasy">📋 Trasy týmů</h2>
        ${routes}`;
      window.__dataLoaded = true;
    }
    run().catch(e => {
      document.getElementById("obsah").innerHTML =
        `<p style="color:#c00">Data se nepodařilo načíst: ${esc(e.message)}</p>`;
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(() => {});
    window.addEventListener("load", () => {
      setTimeout(() => {
        const o = document.getElementById("obsah");
        if (!window.__dataLoaded && o && /Načítám data/.test(o.textContent)) {
          o.innerHTML = `<p style="color:#c00">Data se nedaří načíst — nejspíš slabý signál.</p>
            <button onclick="location.reload()" style="padding:10px 18px;font-size:1rem;cursor:pointer;
              border:2px solid #111;background:#fff;color:#111;border-radius:8px">↻ Zkusit znovu</button>`;
        }
      }, 12000);
    });
  </script>
</body>
</html>
